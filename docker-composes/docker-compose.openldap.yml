version: '3.8'

networks:
  openldap:
    driver: bridge

services:
  openldap:
    image: osixia/openldap:latest
    container_name: openldap
    hostname: openldap
    command: --copy-service
    ports:
      - "389:389"
      - "636:636"
    volumes:
      - ${PWD}/ldap-data/certificates:/container/service/slapd/assets/certs
      - ${PWD}/ldap-data/slapd/database:/var/lib/ldap
      - ${PWD}/ldap-data/slapd/config:/etc/ldap/slapd.d
      - ${PWD}/ldap-data/custom_acl.ldif:/container/service/slapd/assets/config/bootstrap/ldif/custom/custom_acl.ldif
    environment:
      - LDAP_ORGANISATION=nthedao
      - LDAP_DOMAIN=nthedao.info
      - LDAP_ADMIN_USERNAME=admin
      - LDAP_ADMIN_PASSWORD=admin_pass
      - LDAP_CONFIG_PASSWORD=config_pass
      - LDAP_BASE_DN=dc=nthedao,dc=info
      # - LDAP_TLS_CRT_FILENAME=server.crt
      # - LDAP_TLS_KEY_FILENAME=server.key
      # - LDAP_TLS_CA_CRT_FILENAME=alibnr.com.ca.crt
      # - LDAP_READONLY_USER=true
      # - LDAP_READONLY_USER_USERNAME=user-ro
      # - LDAP_READONLY_USER_PASSWORD=ro_pass
    networks:
      - openldap

  phpldapadmin:
    image: osixia/phpldapadmin:latest
    container_name: phpldapadmin
    hostname: phpldapadmin
    ports:
      - "80:80"
    environment:
      - PHPLDAPADMIN_LDAP_HOSTS=openldap
      - PHPLDAPADMIN_HTTPS=false
    depends_on:
      - openldap
    networks:
      - openldap
