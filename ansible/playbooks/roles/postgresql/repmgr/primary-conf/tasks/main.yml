---
# tasks file for primary-conf
- name: Install required packages
  ansible.builtin.apt:
    name: "{{ item }}"
    state: present
  with_items: "{{ common_packages }}"
- name: Copy repmgr scripts to the remote host
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "{{ psql_scripts_repmgr_path }}"
    owner: root
    group: root
    mode: '0755'
  with_items: "{{ repmgr_scripts }}"
- name: Copy repmgr.conf file for repmgr configuration from templates
  ansible.builtin.template:
    src: repmgr.conf.j2
    dest: "{{ psql_repmgr_conf_path }}"
    owner: root
    group: root
    mode: '0644'
- name: Execute repmgr scripts for coordinator
  block:
    - name: Repmgr common scripts for coordinator cluster
      vars:
        repmgr_sql_file: setup-repmgr.sql
      ansible.builtin.shell: |
        {{ psql_scripts_repmgr_path }}/repmgr-common.sh {{ psql_version }}  {{ psql_bindir_path }} {{ psql_scripts_repmgr_path }}/{{ repmgr_sql_file }}
      args:
        chdir: /var/lib/postgresql
        executable: /bin/bash
    - name: Systemd restart PostgreSQL
      become: true
      ansible.builtin.systemd_service:
        name: postgresql
        state: restarted
        enabled: true
