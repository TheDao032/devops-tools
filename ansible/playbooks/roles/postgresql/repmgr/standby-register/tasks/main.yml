---
# tasks file for standby-register
- name: Copy repmgr scripts to the remote host
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "{{ psql_scripts_repmgr_path }}"
    owner: root
    group: root
    mode: '0755'
  with_items: "{{ repmgr_scripts }}"
- name: Repmgr primary scripts for standby cluster
  ansible.builtin.shell: |
    {{ psql_scripts_repmgr_path }}/repmgr-standby.sh {{ psql_version }} {{ master_server_ip }} {{ psql_repmgr_conf_path }} {{ psql_data_directory_path }} {{ coordinator_psql_port }}
  args:
    chdir: /var/lib/postgresql
    executable: /bin/bash
