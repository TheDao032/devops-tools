---
# vars file for coordinator-conn-worker
psql_scripts_citus_path: "/usr/bin"
citus_dbname: citusdb
psql_packages:
  - postgresql-{{ psql_version }}-citus-{{ citus_version }}
citus_scripts:
  - citus-connect.sh
worker_ips:
  - "{{ hostvars['worker1']['private_ip'] }}"
  - "{{ hostvars['worker2']['private_ip'] }}"
