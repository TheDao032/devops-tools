---
# tasks file for dependencies
- name: Install PostgreSQL
  block:
    # - name: Upddate apt packages
    #   ansible.builtin.apt:
    #     update_cache: yes
    - name: Install required packages
      ansible.builtin.apt:
        name: "{{ item }}"
        state: present
      with_items: "{{ common_packages }}"
    - name: Prepare PostgreSQL packages
      ansible.builtin.shell: |
        # PostgreSQL
        sudo install -d /usr/share/postgresql-common/pgdg
        sudo curl -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc --fail https://www.postgresql.org/media/keys/ACCC4CF8.asc

        # Create the repository configuration file:
        sudo sh -c 'echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
      args:
        executable: /bin/bash
    - name: Upddate apt packages
      ansible.builtin.apt:
        update_cache: yes
    - name: Install required packages
      ansible.builtin.apt:
        name: "{{ item }}"
        state: present
      with_items: "{{ psql_packages }}"

- name: Config PostgreSQL
  block:
    - name: Copy pg_hba.conf file for psql configuration from templates
      ansible.builtin.template:
        src: pg_hba.conf.j2
        dest: "{{ psql_conf_folder_path }}/pg_hba.conf"
        owner: vagrant
        group: vagrant
        mode: '0755'
    - name: Set correct permissions on pg_hba.conf
      ansible.builtin.file:
        path: "{{ psql_conf_folder_path }}/pg_hba.conf"
        owner: postgres
        mode: '0755'
      become: yes
      become_user: root
    - name: Systemd restart PostgreSQL
      become: yes
      become_user: root
      ansible.builtin.systemd_service:
        name: postgresql
        state: restarted
        enabled: true
