---
# vars file for server-register
k3s_server_scripts:
  - server-register.sh
psql_k3s_datastore_uri: "postgres://{{ psql_k3s_user }}:{{ psql_k3s_pass }}@{{ hostvars['server-1']['ansible_host'] }}:{{ psql_k3s_port }}/k3s"
k3s_server_scripts_path: /tmp
server_url: "https://{{ server_ip }}:{{ load_balancer_port }}"
