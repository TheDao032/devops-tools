---
# tasks file for server-register
- name: Copy k3s server scripts to the remote host
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "{{ k3s_server_scripts_path }}"
    mode: '0755'
  with_items: "{{ k3s_server_scripts }}"

- name: Get k3s installed version
  ansible.builtin.command: k3s --version
  register: k3s_version_output
  changed_when: false
  ignore_errors: true

- name: k3s server register
  block:
    - name: Get k3s installed version
      ansible.builtin.command: k3s --version
      register: k3s_version_output
      changed_when: false
      ignore_errors: true

    - name: Exec server register script
      when: k3s_version_output.rc != 0 and inventory_hostname == groups['server'][0]
      ansible.builtin.shell: |
        {{ k3s_server_scripts_path }}/server-register.sh {{ keepalived_virtual_ip }} {{ load_balancer_port }} {{ ansible_host }}
      args:
        executable: /bin/bash

- name: k3s side server register
  block:
    - name: Slurp file content from the specific host
      ansible.builtin.slurp:
        src: /var/lib/rancher/k3s/server/token
      delegate_to: "{{ groups['server'][0] }}"
      register: server_token

    - name: Send k3s token from server to all other server
      ansible.builtin.copy:
        content: "{{ server_token.content | b64decode }}"
        dest: /tmp/k3s-server-token
        mode: '0644'

    - name: Exec register script for sidecard server
      when: k3s_version_output.rc != 0 and inventory_hostname != groups['server'][0]
      ansible.builtin.shell: |
        {{ k3s_server_scripts_path }}/server-side-register.sh /tmp/k3s-server-token {{ keepalived_virtual_ip }} {{ api_endpoint }} {{ api_port }} {{ ansible_host }}
      args:
        executable: /bin/bash

- name: k3s secrets vault input
  block:
    # Step 1: Slurp the k3s.yaml file content
    - name: Slurp k3s.yaml file
      ansible.builtin.slurp:
        src: /etc/rancher/k3s/k3s.yaml
      register: k3s_yaml_content

    - name: Slurp k3s/server/token file
      ansible.builtin.slurp:
        src: /var/lib/rancher/k3s/server/token
      register: k3s_token_content

    # Step 2: Parse the YAML content from the slurped base64 data
    - name: Parse k3s.yaml content
      set_fact:
        k3s_yaml_parsed: "{{ k3s_yaml_content['content'] | b64decode | from_yaml }}"

    # Step 3: Extract the required certificate values from the parsed YAML
    - name: Set certificate-authority-data fact
      set_fact:
        cert_authority_data: "{{ k3s_yaml_parsed['clusters'][0]['cluster']['certificate-authority-data'] }}"

    - name: Set client-certificate-data fact
      set_fact:
        client_certificate_data: "{{ k3s_yaml_parsed['users'][0]['user']['client-certificate-data'] }}"

    - name: Set client-key-data fact
      set_fact:
        client_key_data: "{{ k3s_yaml_parsed['users'][0]['user']['client-key-data'] }}"

    - name: Set client-key-data fact
      set_fact:
        client_key_data: "{{ k3s_yaml_parsed['users'][0]['user']['client-key-data'] }}"

    - name: Set token-data fact
      set_fact:
        token_data: "{{ k3s_token_content['content'] | b64decode }}"

    # Step 4: Display the extracted values (Optional for debugging)
    - name: Show extracted certificate-authority-data
      debug:
        msg: "Certificate Authority Data: {{ cert_authority_data }}"

    - name: Show extracted client-certificate-data
      debug:
        msg: "Client Certificate Data: {{ client_certificate_data }}"

    - name: Show extracted client-key-data
      debug:
        msg: "Client Key Data: {{ client_key_data }}"

    - name: Show extracted token-data
      debug:
        msg: "Token Data: {{ token_data }}"

    # Step 5: Store the values in Vault (assuming Vault CLI is available)
    - name: Enable kv secrets with specific path
      become_user: "{{ ansible_user }}"
      environment:
        VAULT_ADDR: "{{ vault_cluster_addr }}"
        VAULT_TOKEN: "{{ vault_token }}"
        VAULT_SKIP_VERIFY: "true"
      ansible.builtin.shell: |
        vault login -address={{ vault_cluster_addr }} -method=token {{ vault_token }}
        vault kv put {{ k3s_secrets_path }} client_ca_crt={{ cert_authority_data }}
      args:
        executable: /bin/bash

    - name: Store client-certificate-data in Vault
      become_user: "{{ ansible_user }}"
      environment:
        VAULT_ADDR: "{{ vault_cluster_addr }}"
        VAULT_TOKEN: "{{ vault_token }}"
        VAULT_SKIP_VERIFY: "true"
      ansible.builtin.shell: |
        # Define multiple new key-value pairs
        declare -A new_data
        new_data["host"]="{{ load_balancer_virtual_url }}"
        new_data["client_crt"]="{{ client_certificate_data }}"
        new_data["client_key"]="{{ client_key_data }}"
        new_data["token"]="{{ token_data }}"

        # Step 1: Get existing data (handle empty cases)
        existing_data=$(vault kv get -format=json {{ k3s_secrets_path }} 2>/dev/null | jq -r '.data.data' || echo '{}')

        # Step 2: Convert `new_data` associative array to JSON format
        new_data_json=$(for key in "${!new_data[@]}"; do
            jq -n --arg key "$key" --arg value "${new_data[$key]}" '{"key": $key, "value": $value}'
        done | jq -s 'from_entries')

        # Step 3: Merge existing data with new key-value pairs
        updated_data=$(echo "$existing_data" | jq --argjson new "$new_data_json" '$new + .')

        # Step 4: Write the updated data back to Vault
        vault kv put {{ k3s_secrets_path }} $(echo "$updated_data" | jq -r 'to_entries|map("\(.key)=\(.value)")|.[]')
      args:
        executable: /bin/bash
