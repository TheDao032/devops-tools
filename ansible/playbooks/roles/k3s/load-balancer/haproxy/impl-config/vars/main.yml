  #   port: 80
  - name: "agent-1"
    ip: "{{ hostvars['agent-1']['ansible_host'] }}"
    port: 80
  - name: "agent-2"
    ip: "{{ hostvars['agent-2']['ansible_host'] }}"
    port: 80

servers_https:
