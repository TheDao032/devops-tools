---
# tasks file for common
- name: Install Ansible Package Debian OS
  block:
    - name: Update cache
      ansible.builtin.apt:
        update_cache: yes
    - name: Install Ansible Package Debian OS
      ansible.builtin.apt:
        name: "{{ item }}"
        state: present
      with_items: "{{ debian_packages }}"
  when: ansible_facts['os_family'] == "Debian"

- name: Install Ansible Package RedHat OS
  block:
    - name: Update cache
      ansible.builtin.dnf:
        update_cache: yes
    - name: Install Ansible Package RedHat OS
      ansible.builtin.dnf:
        name: "{{ item }}"
        state: present
      with_items: "{{ rhel_packages }}"
  when: ansible_facts['os_family'] == "RedHat"

- name: Install Ansible Package Centos OS
  block:
    - name: Update cache
      ansible.builtin.yum:
        update_cache: yes
    - name: Install Ansible Package CentOS OS
      ansible.builtin.yum:
        name: "{{ item }}"
        state: present
      with_items: "{{ centos_packages }}"
  when: ansible_facts['os_family'] == "CentOS"
