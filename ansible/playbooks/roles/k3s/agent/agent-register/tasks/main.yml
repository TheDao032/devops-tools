---
# tasks file for agent-register
- name: Copy k3s agent scripts to the remote host
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "{{ psql_k3s_scripts_path }}"
    mode: '0755'
  with_items: "{{ k3s_agent_scripts }}"

- name: k3s agent register
  block:
    - name: Slurp file content from the specific host
      ansible.builtin.slurp:
        src: /var/lib/rancher/k3s/server/token
      delegate_to: server-1
      register: server_token

    - name: Send k3s token from server to all other server
      ansible.builtin.copy:
        content: "{{ server_token.content | b64decode }}"
        dest: /tmp/k3s-server-token
        mode: '0644'
    - name: Exec register script for agent
      ansible.builtin.shell: |
        {{ psql_k3s_scripts_path }}/agent-register.sh {{ server_url }} /tmp/k3s-server-token
      args:
        executable: /bin/bash
