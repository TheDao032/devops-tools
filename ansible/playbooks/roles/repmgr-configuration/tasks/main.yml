---
# tasks file for repmgr-configuration
- name: Copy repmgr.conf file for repmgr configuration from templates
  ansible.builtin.template:
    src: repmgr.conf.j2
    dest: "{{ psql_repmgr_conf_path }}"
    owner: vagrant
    group: vagrant
    mode: '0644'

- name: Copy repmgr scripts to the remote host
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "{{ psql_scripts_repmgr_path }}"
    owner: vagrant
    group: vagrant
    mode: '0755'
  with_items: "{{ repmgr_scripts }}"

- name: Execute repmgr scripts for master and slave cluster
  become_user: vagrant
  block:
    - name: Repmgr command scripts for both master and slave cluster
      ansible.builtin.shell:
        cmd: "bash -c '{{ psql_scripts_repmgr_path }}/repmgr-common.sh {{ psql_version }} {{ ansible_host }}'"
      args:
        chdir: /var/lib/postgresql
        executable: /bin/bash
    - name: Systemd restart postgresql
      become: yes
      become_user: root
      ansible.builtin.systemd_service:
        name: postgresql
        state: restarted
        enabled: true
    - name: Repmgr primary scripts for master cluster
      ansible.builtin.shell:
        cmd: "bash -c '{{ psql_scripts_repmgr_path }}/repmgr-primary.sh {{ psql_repmgr_conf_path }}'"
      args:
        chdir: /var/lib/postgresql
        executable: /bin/bash
      when: "'master' in ansible_hostname"
    - name: Repmgr standby scripts for slave cluster
      ansible.builtin.shell:
        cmd: "bash -c '{{ psql_scripts_repmgr_path }}/repmgr-standby.sh {{ psql_version }} {{ hostvars['master1']['ansible_host'] }} {{ psql_repmgr_conf_path }} {{ psql_data_directory_path }}'"
      args:
        chdir: /var/lib/postgresql
        executable: /bin/bash
      when: "'slave' in ansible_hostname"
