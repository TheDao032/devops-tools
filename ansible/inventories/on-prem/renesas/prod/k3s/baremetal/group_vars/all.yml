---
# Renesas / prod / k3s / baremetal — leaf-level overrides.
# Anything not set here falls back through the layered inventory chain.

k3s:
  version: "v1.30.2+k3s1"
  cluster_cidr: 10.244.0.0/16
  service_cidr: 10.96.0.0/12
  cluster_dns: 10.96.0.10
  disable:
    - traefik       # using nginx ingress instead per Renesas standard
    - servicelb
