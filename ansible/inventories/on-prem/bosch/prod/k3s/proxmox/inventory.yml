# Bosch / prod / k3s / proxmox — VMs on company Proxmox cluster.

all:
  children:
    server:
      hosts:
        bosch-k3s-pve-server-[1:3]:
          ansible_host: "10.43.20.{{ 10 + (inventory_hostname | regex_search('[0-9]+$') | int) }}"
    agent:
      hosts:
        bosch-k3s-pve-agent-[1:3]:
          ansible_host: "10.43.20.{{ 20 + (inventory_hostname | regex_search('[0-9]+$') | int) }}"
  vars:
    proxmox_api_host: pve.bosch.internal       # TODO
    proxmox_node: pve01                         # TODO
    proxmox_storage: ceph-pool                  # TODO
