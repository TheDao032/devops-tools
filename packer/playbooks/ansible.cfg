# ansible.cfg used by Packer's ansible provisioner during image bake.
#
# Points roles_path at the parent repo so we reuse the same `compliance` role
# that runs at deploy time. No code duplication between bake-time and runtime.

[defaults]
roles_path = ../../ansible/playbooks/roles
host_key_checking = False
retry_files_enabled = False
# `community.general.yaml` callback was REMOVED in community.general 12.0.0.
# Equivalent on ansible-core >= 2.13: builtin default callback + result_format=yaml.
stdout_callback = ansible.builtin.default
result_format = yaml
forks = 5
# Packer drives a single transient builder VM — pipelining is safe here.
# (We disable it in the on-prem ansible.cfg because auditd watchers don't like it.)
pipelining = True
gathering = smart
fact_caching = memory

[ssh_connection]
ssh_args = -o ControlMaster=auto -o ControlPersist=300s -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null
