# RHEL 9 anaconda kickstart for unattended Packer install.
#
# This is the MINIMAL install — just enough for SSH + sudo + python3 so the
# ansible provisioner can run. The compliance role does the actual hardening.
#
# Served by Packer over HTTP from packer/http/ during the boot phase.

# Use text mode (no GUI), accept license, use English/US.
text
eula --agreed
lang en_US.UTF-8
keyboard us
timezone Etc/UTC --utc

# Network: DHCP, hostname assigned by the role at deploy time.
network --bootproto=dhcp --device=link --activate

# Use the netinst repo as the install source (same as the boot ISO).
url --url="cdrom"

# Disk: simple LVM on the whole disk. CIS-L2 will later remount /tmp etc with
# nosuid,nodev,noexec — but the partitions themselves are made here.
ignoredisk --only-use=sda
zerombr
clearpart --all --initlabel --drives=sda
autopart --type=lvm --nohome

bootloader --location=mbr --boot-drive=sda

# Root: locked. The bootstrap user does sudo-only access.
rootpw --lock

# Bootstrap user — Packer SSHes in as this user. Password matches the var in
# the .pkrvars.hcl ssh_password field. Real deployments rotate this away.
user --name=packer --password=packer --plaintext --groups=wheel

# Allow wheel without prompt — needed by Packer's `sudo -S` flow.
%post --erroronfail
echo "packer ALL=(ALL) NOPASSWD:ALL" > /etc/sudoers.d/99-packer
chmod 0440 /etc/sudoers.d/99-packer
%end

# Minimal package set. Compliance role installs everything else it needs.
%packages
@core
openssh-server
sudo
python3
%end

# SELinux enforcing — CIS-L2 expects this and the role asserts it.
selinux --enforcing
firewall --enabled --ssh

# Reboot when done so Packer's SSH wait loop can grab the box.
reboot
